version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: botsignal-postgres
    environment:
      POSTGRES_USER: botsignal
      POSTGRES_PASSWORD: botsignal_dev_password
      POSTGRES_DB: botsignal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botsignal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

