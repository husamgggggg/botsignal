name: botsignal
description: Binary Options Signals Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Push Notifications (optional - disabled for web compatibility)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.9

  # Device Info
  device_info_plus: ^9.1.1
  uuid: ^4.2.1

  # UI
  intl: ^0.20.2
  url_launcher: ^6.2.2
  flutter_svg: ^2.0.9
  go_router: ^13.0.0

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  # Assets
  assets:
    - assets/images/

